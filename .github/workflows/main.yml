name: Build Census App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer
        run: |
          # تثبيت buildozer محلياً للمستخدم لتجنب قيود النظام
          pip install --user buildozer
          # إضافة مسار الأدوات لنظام التشغيل
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          # قبول التراخيص وبدء البناء فوراً
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Census-Final-APK
          path: bin/*.apk
          

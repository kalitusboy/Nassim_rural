name: Build Kivy App (Census 2026)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # هذه الأداة هي الأكثر استقراراً حالياً لبناء تطبيقات Kivy
        uses: kivymd/buildozer-action@master
        with:
          command: buildozer android debug
          buildozer_version: master
          repository_root: .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Census-2026-App
          path: bin/*.apk
          

name: Build Kivy App (Census 2026)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev
          sudo apt-get install -y libncurses5 libncursesw5-dev zlib1g-dev zip unzip
          sudo apt-get install -y autoconf automake libtool
          python -m pip install --upgrade pip
          pip install buildozer kivy

      - name: Build with Buildozer
        run: |
          # هذه الخطوة ستقوم ببناء الـ APK يدوياً
          buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Census-2026-App
          path: bin/*.apk
          

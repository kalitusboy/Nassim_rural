name: Build Census App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev \
            libncurses5 libncursesw5-dev zlib1g-dev zip unzip autoconf automake libtool \
            pkg-config libgimpprint-dev python3-pip android-sdk
          pip install --user --upgrade buildozer kivy

      - name: Build APK
        run: |
          # إضافة مسار buildozer للنظام
          export PATH=$PATH:$HOME/.local/bin
          # بدء البناء مع قبول التراخيص تلقائياً
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Census-Final-App
          path: bin/*.apk
          
